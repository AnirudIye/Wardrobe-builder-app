# Alembic configuration. The database URL is NOT set here - alembic/env.py
# reads it from app settings (DATABASE_URL in .env / environment), so
# migrations always target the same database as the app.
[alembic]
script_location = alembic
# Make the backend dir importable as the `app` package when migrations run
# via the bare `alembic` console script (Render's start command). `python -m
# alembic` adds the CWD to sys.path itself; the console script does not.
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
